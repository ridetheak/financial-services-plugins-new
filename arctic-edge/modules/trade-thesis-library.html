<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arctic Edge — Trade Thesis Library</title>
<!--
  Arctic Edge — Module 4: Trade Thesis Library
  Terminal surface: section-thesis
  Input contract: advisor entry at trade time
  Compute: immutable capture timestamp; searchable archive; outcome close-out
  Output artifact: trade-thesis/v1 records
  Compliance: not regulated work product; the multi-year archive is the
              track record — capture timestamps are never editable.
-->
<style>
:root{
  --arctic-800:#1C2B35;--glacier-700:#1F5D74;--glacier-500:#4494B0;
  --paper-0:#FFFFFF;--paper-2:#F4F8FA;--paper-3:#ECF2F5;
  --ink-900:#0A1219;--ink-700:#243845;--ink-500:#5A6C77;--ink-400:#7D8D96;
  --border-1:#DCE4E8;--border-2:#C7D2D8;
  --ok-500:#1F9D6B;--ok-100:#DCEFE2;--warn-500:#D77A1A;--warn-100:#FCE8D2;
  --risk-500:#B64841;--risk-100:#F4DEDB;--info-500:#3F74A1;--info-100:#DEE9F3;
  --font-sans:"Inter Tight",ui-sans-serif,system-ui,-apple-system,sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--paper-2);color:var(--ink-900);font-size:13px;line-height:1.45;padding:24px;}
.module{max-width:940px;margin:0 auto;background:var(--paper-0);border:1px solid var(--border-1);border-radius:8px;overflow:hidden;}
.module-head{background:var(--arctic-800);color:#fff;padding:14px 20px;}
.module-head h1{font-size:15px;font-weight:600;}
.module-head p{font-size:11px;color:#9EC5D8;margin-top:2px;}
.module-body{padding:20px;}
.group-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--glacier-700);
  padding-bottom:6px;border-bottom:1px solid var(--border-1);margin:18px 0 10px;}
.group-title:first-child{margin-top:0;}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field.full{grid-column:1/-1;}
label{font-size:11px;font-weight:500;color:var(--ink-500);}
input,select,textarea{font-family:var(--font-sans);font-size:13px;padding:7px 9px;border:1px solid var(--border-2);
  border-radius:5px;background:var(--paper-0);color:var(--ink-900);}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--glacier-500);box-shadow:0 0 0 3px rgba(68,148,176,.18);}
textarea{resize:vertical;min-height:52px;}
.btn{font-family:var(--font-sans);font-size:12px;font-weight:500;padding:7px 14px;border-radius:5px;
  border:1px solid var(--border-2);background:var(--paper-0);color:var(--ink-700);cursor:pointer;}
.btn:hover{background:var(--paper-3);}
.btn.primary{background:var(--glacier-700);border-color:var(--glacier-700);color:#fff;}
.btn-row{display:flex;gap:8px;margin-top:8px;}
.search-row{display:flex;gap:8px;margin-bottom:10px;}
.search-row input,.search-row select{flex:0 0 auto;}
.search-row input{flex:1;}
.thesis{border:1px solid var(--border-1);border-radius:7px;padding:12px 14px;margin-bottom:10px;}
.thesis-top{display:flex;align-items:baseline;gap:8px;margin-bottom:6px;}
.thesis-ticker{font-family:var(--font-mono);font-weight:600;font-size:14px;}
.thesis-action{font-size:10px;text-transform:uppercase;letter-spacing:.05em;padding:2px 7px;border-radius:4px;
  background:var(--info-100);color:var(--info-500);}
.thesis-ts{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--ink-400);}
.thesis-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;font-size:12px;margin-top:4px;}
.thesis-grid .k{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-400);}
.thesis-grid .full{grid-column:1/-1;}
.status-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;}
.status-pill.open{background:var(--warn-100);color:#9E5714;}
.status-pill.closed{background:var(--ok-100);color:#167A52;}
.outcome-box{margin-top:8px;padding-top:8px;border-top:1px solid var(--paper-3);}
.empty{font-size:12px;color:var(--ink-400);text-align:center;padding:24px;}
.status{font-size:12px;padding:8px 12px;border-radius:5px;margin-top:10px;display:none;}
.status.show{display:block;}
.status.ok{background:var(--ok-100);color:#167A52;border:1px solid var(--ok-500);}
.status.err{background:var(--risk-100);color:#8A2F2A;border:1px solid var(--risk-500);}
</style>
</head>
<body>
<div class="module">
  <div class="module-head">
    <h1>Trade Thesis Library</h1>
    <p>Arctic Edge Phase 1, Module 4 — timestamped, searchable thesis archive</p>
  </div>
  <div class="module-body">

    <div class="group-title">Capture Thesis</div>
    <div class="row">
      <div class="field"><label>Ticker / position</label><input id="ticker" placeholder="e.g. AAPL"></div>
      <div class="field"><label>Action</label>
        <select id="action"><option>New position</option><option>Add</option><option>Trim</option><option>Exit</option></select>
      </div>
      <div class="field"><label>Conviction</label>
        <select id="conviction"><option>Low</option><option>Moderate</option><option>High</option></select>
      </div>
    </div>
    <div class="row">
      <div class="field full"><label>Variant perception — what the market is getting wrong</label>
        <textarea id="variant" placeholder="Your differentiated view vs. consensus"></textarea></div>
    </div>
    <div class="row">
      <div class="field full"><label>Catalyst</label>
        <textarea id="catalyst" placeholder="What re-rates this and roughly when"></textarea></div>
    </div>
    <div class="row">
      <div class="field"><label>Time horizon</label><input id="horizon" placeholder="e.g. 12–18 months"></div>
      <div class="field full" style="grid-column:2/-1"><label>Exit condition</label>
        <input id="exit" placeholder="What proves the thesis right — or wrong"></div>
    </div>
    <div class="btn-row">
      <button class="btn primary" onclick="saveThesis()">Save to Library</button>
    </div>
    <div id="status" class="status"></div>

    <div class="group-title">Library</div>
    <div class="search-row">
      <input id="search" placeholder="Search ticker, catalyst, variant…" oninput="renderLibrary()">
      <select id="filterStatus" onchange="renderLibrary()">
        <option value="all">All</option><option value="open">Open</option><option value="closed">Closed</option>
      </select>
    </div>
    <div id="library"></div>

  </div>
</div>

<script>
const KEY="arctic-edge.trade-thesis-library";
let theses=JSON.parse(localStorage.getItem(KEY)||"[]");

function persist(){localStorage.setItem(KEY,JSON.stringify(theses));}
function showStatus(msg,ok){const s=document.getElementById("status");s.textContent=msg;s.className="status show "+(ok?"ok":"err");}
function uid(){return "thx-"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function saveThesis(){
  const t={
    id:uid(),
    contract:"trade-thesis/v1",
    ticker:document.getElementById("ticker").value.trim().toUpperCase(),
    action:document.getElementById("action").value,
    conviction:document.getElementById("conviction").value,
    variantPerception:document.getElementById("variant").value.trim(),
    catalyst:document.getElementById("catalyst").value.trim(),
    timeHorizon:document.getElementById("horizon").value.trim(),
    exitCondition:document.getElementById("exit").value.trim(),
    capturedAt:new Date().toISOString(), // immutable
    status:"open",
    outcome:null,
  };
  const missing=[];
  if(!t.ticker) missing.push("ticker");
  if(!t.variantPerception) missing.push("variant perception");
  if(!t.catalyst) missing.push("catalyst");
  if(!t.exitCondition) missing.push("exit condition");
  if(missing.length){showStatus("Missing required fields: "+missing.join(", "),false);return;}
  theses.unshift(t);
  persist();
  ["ticker","variant","catalyst","horizon","exit"].forEach(id=>document.getElementById(id).value="");
  showStatus(`Thesis for ${t.ticker} captured and timestamped.`,true);
  renderLibrary();
}

function closeThesis(id){
  const t=theses.find(x=>x.id===id);
  const result=document.getElementById("res-"+id).value;
  const notes=document.getElementById("note-"+id).value.trim();
  if(!result){alert("Select an outcome result.");return;}
  t.status="closed";
  t.outcome={result,notes,closedAt:new Date().toISOString()};
  persist();renderLibrary();
}

function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function renderLibrary(){
  const q=document.getElementById("search").value.toLowerCase();
  const fs=document.getElementById("filterStatus").value;
  const list=theses.filter(t=>{
    if(fs!=="all"&&t.status!==fs) return false;
    if(!q) return true;
    return (t.ticker+" "+t.variantPerception+" "+t.catalyst+" "+t.exitCondition).toLowerCase().includes(q);
  });
  const lib=document.getElementById("library");
  if(!list.length){lib.innerHTML=`<div class="empty">No theses ${theses.length?"match the filter":"captured yet"}.</div>`;return;}
  lib.innerHTML=list.map(t=>`
    <div class="thesis">
      <div class="thesis-top">
        <span class="thesis-ticker">${esc(t.ticker)}</span>
        <span class="thesis-action">${esc(t.action)}</span>
        <span class="status-pill ${t.status}">${t.status}</span>
        <span class="thesis-ts">${new Date(t.capturedAt).toLocaleString()}</span>
      </div>
      <div class="thesis-grid">
        <div class="full"><div class="k">Variant perception</div>${esc(t.variantPerception)}</div>
        <div class="full"><div class="k">Catalyst</div>${esc(t.catalyst)}</div>
        <div><div class="k">Time horizon</div>${esc(t.timeHorizon)||"—"}</div>
        <div><div class="k">Conviction</div>${esc(t.conviction)}</div>
        <div class="full"><div class="k">Exit condition</div>${esc(t.exitCondition)}</div>
      </div>
      ${t.status==="closed"?`
        <div class="outcome-box">
          <div class="thesis-grid"><div class="full"><div class="k">Outcome — ${esc(t.outcome.result)}</div>
          ${esc(t.outcome.notes)||"No notes."} <span class="thesis-ts">closed ${new Date(t.outcome.closedAt).toLocaleDateString()}</span></div></div>
        </div>`:`
        <div class="outcome-box">
          <div class="row" style="grid-template-columns:160px 1fr auto;margin-bottom:0">
            <select id="res-${t.id}">
              <option value="">Outcome…</option>
              <option>Thesis correct</option><option>Thesis wrong</option>
              <option>Partially correct</option><option>Closed — thesis untested</option>
            </select>
            <input id="note-${t.id}" placeholder="Post-mortem notes">
            <button class="btn" onclick="closeThesis('${t.id}')">Close out</button>
          </div>
        </div>`}
    </div>`).join("");
}
renderLibrary();
</script>
</body>
</html>
