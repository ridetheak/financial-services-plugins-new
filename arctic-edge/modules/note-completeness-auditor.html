<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arctic Edge — Note Completeness Auditor</title>
<!--
  Arctic Edge — Module 7: Note Completeness Auditor  [REGULATED WORK PRODUCT]
  Terminal surface: section-compliance
  Input contract: a finished trade note (generated or hand-written)
  Compute: heuristic scan against reg-bi-checklist/v1; flags apparent gaps
  Output artifact: note-audit/v1
  Compliance: REGULATED. This is an AFFIRMATIVE, NON-BLOCKING pre-submission
              check. It flags apparent gaps for the advisor to review; it
              never blocks, never auto-files, and keeps NO override logs.
              The checklist must be maintained by a compliance professional.
-->
<style>
:root{
  --arctic-800:#1C2B35;--glacier-700:#1F5D74;--glacier-500:#4494B0;
  --paper-0:#FFFFFF;--paper-2:#F4F8FA;--paper-3:#ECF2F5;
  --ink-900:#0A1219;--ink-700:#243845;--ink-500:#5A6C77;--ink-400:#7D8D96;
  --border-1:#DCE4E8;--border-2:#C7D2D8;
  --ok-500:#1F9D6B;--ok-100:#DCEFE2;--warn-500:#D77A1A;--warn-100:#FCE8D2;
  --warn-700:#9E5714;--risk-500:#B64841;--risk-100:#F4DEDB;
  --font-sans:"Inter Tight",ui-sans-serif,system-ui,-apple-system,sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--paper-2);color:var(--ink-900);font-size:13px;line-height:1.45;padding:24px;}
.module{max-width:880px;margin:0 auto;background:var(--paper-0);border:1px solid var(--border-1);border-radius:8px;overflow:hidden;}
.module-head{background:var(--arctic-800);color:#fff;padding:14px 20px;}
.module-head h1{font-size:15px;font-weight:600;}
.module-head p{font-size:11px;color:#9EC5D8;margin-top:2px;}
.compliance-banner{background:var(--warn-100);border-bottom:1px solid var(--warn-500);
  color:var(--warn-700);font-size:11px;padding:9px 20px;font-weight:500;}
.module-body{padding:20px;}
.group-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--glacier-700);
  padding-bottom:6px;border-bottom:1px solid var(--border-1);margin:18px 0 10px;}
.group-title:first-child{margin-top:0;}
label{font-size:11px;font-weight:500;color:var(--ink-500);display:block;margin-bottom:4px;}
textarea{width:100%;font-family:var(--font-mono);font-size:11px;padding:9px 11px;border:1px solid var(--border-2);
  border-radius:5px;min-height:170px;resize:vertical;}
textarea:focus{outline:none;border-color:var(--glacier-500);box-shadow:0 0 0 3px rgba(68,148,176,.18);}
.btn{font-family:var(--font-sans);font-size:12px;font-weight:500;padding:7px 14px;border-radius:5px;
  border:1px solid var(--border-2);background:var(--paper-0);color:var(--ink-700);cursor:pointer;}
.btn:hover{background:var(--paper-3);}
.btn.primary{background:var(--glacier-700);border-color:var(--glacier-700);color:#fff;}
.btn-row{display:flex;gap:8px;margin-top:8px;}
.summary{display:none;margin-top:14px;padding:11px 14px;border-radius:6px;font-size:12px;}
.summary.show{display:block;}
.summary.complete{background:var(--ok-100);border:1px solid var(--ok-500);color:#167A52;}
.summary.gaps{background:var(--warn-100);border:1px solid var(--warn-500);color:var(--warn-700);}
.check{display:flex;gap:10px;align-items:flex-start;padding:9px 11px;border:1px solid var(--border-1);
  border-radius:6px;margin-top:7px;}
.check-icon{font-family:var(--font-mono);font-weight:700;flex-shrink:0;width:18px;text-align:center;}
.check.present .check-icon{color:var(--ok-500);}
.check.flagged .check-icon{color:var(--warn-500);}
.check-body .name{font-weight:600;font-size:12px;}
.check-body .desc{font-size:11px;color:var(--ink-500);margin-top:1px;}
.check-list{display:none;}
.check-list.show{display:block;}
.note{font-size:10px;color:var(--ink-400);margin-top:10px;}
.status{font-size:12px;padding:8px 12px;border-radius:5px;margin-top:10px;display:none;}
.status.show{display:block;}
.status.err{background:var(--risk-100);color:#8A2F2A;border:1px solid var(--risk-500);}
</style>
</head>
<body>
<div class="module">
  <div class="module-head">
    <h1>Note Completeness Auditor</h1>
    <p>Arctic Edge Phase 1, Module 7 — affirmative Reg BI pre-submission check</p>
  </div>
  <div class="compliance-banner">
    REGULATED — affirmative, NON-BLOCKING check. It flags apparent gaps for advisor review.
    It never blocks, never auto-files, and keeps no override logs. Checklist: reg-bi-checklist/v1.
  </div>
  <div class="module-body">

    <div class="group-title">Trade Note</div>
    <label>Paste the finished note (generated by Module 6 or hand-written)</label>
    <textarea id="noteText" placeholder="Paste the full trade note here…"></textarea>
    <div class="btn-row">
      <button class="btn primary" onclick="audit()">Run Completeness Check</button>
      <button class="btn" onclick="exportAudit()">Export audit JSON</button>
    </div>
    <div id="status" class="status"></div>

    <div id="summary" class="summary"></div>
    <div id="checks" class="check-list"></div>
    <div class="note" id="footNote"></div>

  </div>
</div>

<script>
// ── reg-bi-checklist/v1 ─────────────────────────────────────────
// Maintained by compliance. Each element has cue phrases the heuristic
// scan looks for. A miss is a FLAG for advisor review, never a block.
const CHECKLIST_VERSION="reg-bi-checklist/v1";
const CHECKLIST=[
  {id:"recommendation",name:"Recommendation stated",
   desc:"The specific action and security are identified.",
   cues:["recommend","buy","sell","hold","add to","trim","position"]},
  {id:"profile",name:"Client investment profile",
   desc:"Objective, risk tolerance, and time horizon are documented.",
   cues:["objective","risk tolerance","risk capacity","time horizon","investment profile"]},
  {id:"care-basis",name:"Care Obligation — basis for recommendation",
   desc:"Why the recommendation is in the client's best interest.",
   cues:["best interest","basis for","fits the","care obligation","suitable"]},
  {id:"alternatives",name:"Reasonably available alternatives considered",
   desc:"Other options were weighed — a core Reg BI requirement.",
   cues:["alternative","other options","considered","reasonably available"]},
  {id:"costs",name:"Cost consideration",
   desc:"Costs/fees of the recommendation were factored in.",
   cues:["cost","fee","expense","expense ratio","commission"]},
  {id:"conflicts",name:"Conflict of interest",
   desc:"Material conflicts identified — or affirmatively stated as none.",
   cues:["conflict","no conflict","none identified","compensation"]},
  {id:"disclosure",name:"Disclosure",
   desc:"Disclosures provided to the client (Form CRS, fee schedule, etc.).",
   cues:["disclos","form crs","fee schedule","prospectus"]},
  {id:"date",name:"Date",
   desc:"The note is dated.",
   cues:[]}, // date handled by regex below
];

let lastAudit=null;

function audit(){
  const text=document.getElementById("noteText").value;
  if(text.trim().length<40){
    const s=document.getElementById("status");
    s.textContent="Paste a complete note to audit.";s.className="status show err";
    return;
  }
  document.getElementById("status").className="status";
  const lower=text.toLowerCase();
  const hasDate=/\b\d{4}-\d{2}-\d{2}\b/.test(text)||
    /\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\.?\s+\d{1,2}/i.test(text);

  const results=CHECKLIST.map(item=>{
    let present;
    if(item.id==="date") present=hasDate;
    else present=item.cues.some(c=>lower.includes(c));
    return {id:item.id,name:item.name,desc:item.desc,present};
  });
  const flagged=results.filter(r=>!r.present);

  lastAudit={
    contract:"note-audit/v1",
    checklistVersion:CHECKLIST_VERSION,
    auditedAt:new Date().toISOString(),
    blocking:false,
    elements:results,
    flaggedCount:flagged.length,
  };

  const sum=document.getElementById("summary");
  if(flagged.length===0){
    sum.className="summary show complete";
    sum.textContent="All "+CHECKLIST.length+" Reg BI elements appear present. This is an affirmative check — the advisor still reviews the note before it reaches the client file.";
  }else{
    sum.className="summary show gaps";
    sum.textContent=flagged.length+" element(s) flagged for review: "+flagged.map(f=>f.name).join(", ")+
      ". These are flags, not blocks — the advisor decides whether the note is complete.";
  }

  document.getElementById("checks").innerHTML=results.map(r=>`
    <div class="check ${r.present?"present":"flagged"}">
      <div class="check-icon">${r.present?"✓":"!"}</div>
      <div class="check-body">
        <div class="name">${r.name}</div>
        <div class="desc">${r.present?r.desc:r.desc+" — not detected; confirm it is present."}</div>
      </div>
    </div>`).join("");
  document.getElementById("checks").classList.add("show");
  document.getElementById("footNote").textContent=
    "Heuristic text scan against "+CHECKLIST_VERSION+". A flag means a cue was not detected, not that the note is wrong — advisor judgment governs. No override is recorded either way.";
}

function exportAudit(){
  if(!lastAudit){
    const s=document.getElementById("status");
    s.textContent="Run the check first.";s.className="status show err";return;
  }
  const blob=new Blob([JSON.stringify(lastAudit,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);a.download="note-audit.json";a.click();
}
</script>
</body>
</html>
